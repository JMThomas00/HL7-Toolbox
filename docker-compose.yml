version: '3.8'

services:
  hl7-creator:
    build: .
    container_name: hl7-message-creator
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DISPLAY=:99
    restart: unless-stopped

  # Placeholder for Mirth Connect integration (for future use)
